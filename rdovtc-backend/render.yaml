services:
  - type: web
    name: rdovtc-student-management-portal-v2
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    region: oregon
    healthCheckPath: /health

    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        generateValue: true
      - key: APP_URL
        value: https://rdovtc-student-management-portal-v2.onrender.com

      - key: DATABASE_URL
        fromDatabase:
          name: rdovtc-db
          property: connectionString

      - key: DB_CONNECTION
        value: pgsql
      - key: DB_SSLMODE
        value: require

      # JWT Secret — generated once, stays stable across deploys
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_TTL
        value: 1440

      - key: FRONTEND_URL
        value: https://rdovtc-student-management-portal-2.vercel.app

      - key: LOG_CHANNEL
        value: stderr
      # FILE-based cache — no database cache table required
      - key: CACHE_STORE
        value: file
      - key: SESSION_DRIVER
        value: file

databases:
  - name: rdovtc-db
    plan: free
    region: oregon
    databaseName: rdovtc
    user: rdovtc_user
