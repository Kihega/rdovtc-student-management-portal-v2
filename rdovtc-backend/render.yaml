# render.yaml — Infrastructure-as-code for Render.com
# Place this file in the ROOT of the rdovtc-backend repo.
# Render reads it automatically when you connect the repo.

services:
  - type: web
    name: rdovtc-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    region: oregon           # must match the region of rdovtc-db below
    healthCheckPath: /health

    # Render waits this many seconds before declaring the service unhealthy.
    # Set high enough to cover: Docker build + DB wait + migrate + seed (~3min).
    initialDeployHook: "echo deploy started"

    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        generateValue: true
      - key: APP_URL
        value: https://rdovtc-backend.onrender.com   # update to your actual URL

      # Render auto-injects DATABASE_URL from the linked database below.
      # The pgsql driver reads it automatically via config/database.php.
      - key: DATABASE_URL
        fromDatabase:
          name: rdovtc-db
          property: connectionString

      - key: DB_CONNECTION
        value: pgsql
      - key: DB_SSLMODE
        value: require

      - key: FRONTEND_URL
        value: https://rdovtc-frontend.vercel.app   # update to your Vercel URL

      - key: LOG_CHANNEL
        value: stderr
      - key: CACHE_STORE
        value: database
      - key: SESSION_DRIVER
        value: cookie

# ── Free PostgreSQL ────────────────────────────────────────────────────────────
# IMPORTANT: region must match the web service region above (both = oregon).
# If they are in different regions, DATABASE_URL internal hostname won't resolve.
#
# Free tier expires every 30 days. When Render emails you:
#   1. Render dashboard -> delete rdovtc-db
#   2. New -> PostgreSQL (same settings) -> Free
#   3. Copy new Internal Database URL
#   4. Web service -> Environment -> update DATABASE_URL -> Save (auto-redeploys)
databases:
  - name: rdovtc-db
    plan: free
    region: oregon           # MUST match web service region
    databaseName: rdovtc
    user: rdovtc_user
