name: PR Quality Gate

on:
  pull_request:
    branches: [main, develop]

jobs:
  quality:
    name: 🔍 PR Quality Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # needed for diff analysis

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, pdo, pdo_sqlite, bcmath, zip
          coverage: none

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Check code style
        run: ./vendor/bin/pint --test

      - name: Run tests
        run: |
          cp .env.example .env
          php artisan key:generate
          php artisan test

      - name: Check for debug statements
        run: |
          if grep -rn "dd(\|dump(\|var_dump(\|print_r(" app/ --include="*.php"; then
            echo "❌ Debug statements found — remove before merging"
            exit 1
          fi
          echo "✅ No debug statements found"

      - name: Check for hardcoded credentials
        run: |
          if grep -rn \
            -e "password.*=.*['\"][^'\"]\+['\"]" \
            -e "DB_PASSWORD.*=.*[^$]" \
            app/ --include="*.php" | grep -v "Hash::make\|bcrypt\|test\|factory"; then
            echo "⚠️  Possible hardcoded credentials — review carefully"
          fi
          echo "✅ Credential check complete"
