name: Backend CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # JOB 1: Code Quality — Laravel Pint (style) + static analysis
  # ────────────────────────────────────────────────────────────────────────────
  lint:
    name: 🎨 Code Style (Pint)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, pdo, pdo_sqlite
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Run Laravel Pint
        run: ./vendor/bin/pint --test
        # --test flag: exits with error if any file needs reformatting
        # Remove --test and use just `pint` to auto-fix instead

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 2: Tests — PHPUnit with SQLite in-memory (fast) + PostgreSQL service
  # ────────────────────────────────────────────────────────────────────────────
  test:
    name: 🧪 PHPUnit Tests
    runs-on: ubuntu-latest
    needs: lint

    # Optional: also test against real PostgreSQL (mirrors production)
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: rdovtc_test
          POSTGRES_USER: rdovtc_user
          POSTGRES_PASSWORD: secret
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, pdo, pdo_pgsql, pdo_sqlite, bcmath, zip
          coverage: xdebug

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Copy .env for testing
        run: cp .env.example .env

      - name: Generate application key
        run: php artisan key:generate

      - name: Run PHPUnit tests with coverage (SQLite in-memory — fast)
        run: php artisan test --coverage --min=70
        # phpunit.xml configures DB_CONNECTION=sqlite for the test suite

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 3: Deploy to Render — only on push to main, after tests pass
  # ────────────────────────────────────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to Render
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Trigger Render deploy hook
        run: |
          curl -s -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" \
            -o /dev/null -w "HTTP status: %{http_code}\n"
        # Set RENDER_DEPLOY_HOOK_URL in:
        # GitHub repo → Settings → Secrets and variables → Actions
        # Get the hook URL from: Render dashboard → your service → Settings → Deploy Hook

      - name: Wait for Render to come up
        run: |
          echo "Waiting 90s for Render to build and start..."
          sleep 90

      - name: Health check
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.RENDER_APP_URL }}/health")
          if [ "$STATUS" != "200" ]; then
            echo "❌ Health check failed with HTTP $STATUS"
            exit 1
          fi
          echo "✅ App is live — HTTP $STATUS"
        # Set RENDER_APP_URL in GitHub secrets
        # e.g. https://rdovtc-backend.onrender.com
